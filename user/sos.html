<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Emergency SOS | MedConnect V2</title>

<link rel="stylesheet" href="../css/styles.css">
<!-- LEAFLET MAPS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#f8fafc; /* Clinical Light Background */
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.sos-container{
background:#ffffff;
padding:50px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
border: 1px solid #e2e8f0;
text-align:center;
width:450px;
}

h1{
color:#dc2626; /* Medical Red */
margin-bottom:10px;
font-size:32px;
font-weight: 800;
}

.desc{
color:#64748b;
margin-bottom:35px;
font-size: 16px;
}

/* SOS BUTTON */
.sos-button{
width:200px;
height:200px;
border-radius:50%;
border:none;
background:#dc2626; /* Solid Medical Red */
color:white;
font-size:32px;
font-weight:800;
cursor:pointer;
box-shadow: 0 10px 25px rgba(220, 38, 38, 0.2);
transition: all 0.3s ease;
border: 6px solid #fecaca;
}

.sos-button:hover{
background:#b91c1c;
border-color: #f87171;
transform: scale(1.02);
}

.sos-button:disabled {
background: #cbd5e1;
border-color: #e2e8f0;
color: #ffffff;
box-shadow: none;
transform: none;
pointer-events: none;
}
}

/* OPTIONS */
.options{
margin-top:25px;
display:none;
}

.option-btn{
display:block;
width:100%;
padding:14px;
margin:10px 0;
border-radius:10px;
border:none;
cursor:pointer;
font-weight:600;
background:#0284c7;
color:white;
}

.option-btn:hover{
background:#0369a1;
}

/* INPUT */
.input-text{
display:block;
width:calc(100% - 20px);
padding:12px 10px;
margin:10px 0;
border-radius:8px;
border:1px solid #cbd5e1;
font-family:'Inter', sans-serif;
font-size:15px;
}
.input-text:focus{
outline:none;
border-color:#0284c7;
box-shadow: 0 0 0 3px rgba(2,132,199,0.1);
}

#otherInput, #thirdPartyForm, #selfOptions{
display:none;
}

/* STATUS */
.status{
margin-top:20px;
font-weight:600;
color:#0b2c48;
}

.success{
color:green;
}

.back-link{
display: block;
text-align: left;
margin-bottom: 20px;
color: #64748b;
text-decoration: none;
font-weight: 600;
transition: color 0.3s ease;
}

.back-link:hover{
color: #0284c7;
}

.success-screen {
animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
from { opacity: 0; transform: scale(0.95); }
to { opacity: 1; transform: scale(1); }
}

</style>

</head>

<body>

<div class="sos-container">

<a href="dashboard.html" class="back-link">← Back to Dashboard</a>

<h1>Emergency SOS</h1>

<p class="desc">
Tap SOS to alert nearby hospitals instantly.
</p>

<button class="sos-button" id="sosBtn" onclick="showOptions()">
SOS
</button>

<div class="options" id="options">
    <h3 style="margin-bottom:15px; color:#1e293b;">Who is this emergency for?</h3>
    <button class="option-btn" onclick="showSelfOptions()" style="background:#10b981;">For Myself</button>
    <button class="option-btn" onclick="showThirdPartyForm()" style="background:#f59e0b;">For Someone Else</button>
</div>

<!-- SELF OPTIONS -->
<div id="selfOptions" style="margin-top:20px;">
    <button class="option-btn" onclick="selectEmergency('Medical Emergency')">Use Registered Medical Profile</button>
    <button class="option-btn" onclick="showOther()">Other Emergency</button>
    <input id="otherInput" class="input-text" placeholder="Describe emergency (e.g., Car Crash)">
    <button class="option-btn" onclick="startSOS(true)" style="background:#dc2626; margin-top:20px;">🚨 Dispatch Ambulance</button>
</div>

<!-- THIRD PARTY FORM -->
<div id="thirdPartyForm" style="margin-top:20px; text-align:left;">
    <label style="font-weight:600; font-size:14px; color:#475569;">Victim Name (Optional)</label>
    <input id="tpName" class="input-text" placeholder="e.g. John Doe">
    
    <label style="font-weight:600; font-size:14px; color:#475569;">Victim Phone (Optional)</label>
    <input id="tpPhone" class="input-text" placeholder="e.g. +1 555-0199">
    
    <label style="font-weight:600; font-size:14px; color:#475569;">What happened? *</label>
    <input id="tpCondition" class="input-text" placeholder="e.g. Unconscious, bleeding">
    
    <button class="option-btn" onclick="startSOS(false)" style="background:#dc2626; margin-top:20px;">🚨 Dispatch Ambulance</button>
</div>

<div class="status" id="statusText">
System ready.
</div>

</div>

<script src="../js/api-config.js"></script>
<script>

let selectedEmergency = "";
let polling = null;

// SHOW OPTIONS
function showOptions(){
    document.getElementById("sosBtn").style.display = "none";
    document.querySelector(".desc").style.display = "none";
    document.getElementById("options").style.display = "block";
}

function showSelfOptions(){
    document.getElementById("options").style.display = "none";
    document.getElementById("selfOptions").style.display = "block";
}

function showThirdPartyForm(){
    document.getElementById("options").style.display = "none";
    document.getElementById("thirdPartyForm").style.display = "block";
}

// SELECT
function selectEmergency(type){
    selectedEmergency = type;
    document.getElementById("otherInput").style.display = "none";
}

// OTHER INPUT
function showOther(){
    document.getElementById("otherInput").style.display = "block";
    selectedEmergency = ""; // Reset to require input
}

// MAIN SOS
async function startSOS(isSelf){

    const status = document.getElementById("statusText");
    let emergencyType = selectedEmergency;
    let tpName = "";
    let tpPhone = "";
    let tpCondition = "";

    // VALIDATION LOGIC
    if(isSelf){
        if(document.getElementById("otherInput").style.display === "block"){
            emergencyType = document.getElementById("otherInput").value.trim();
        }
        if(!emergencyType){
            alert("Please provide or select an emergency type.");
            return;
        }
    } else {
        tpName = document.getElementById("tpName").value.trim();
        tpPhone = document.getElementById("tpPhone").value.trim();
        tpCondition = document.getElementById("tpCondition").value.trim();
        if(!tpCondition){
            alert("Please describe what happened to the victim.");
            return;
        }
        emergencyType = tpCondition; // map primary emergency string
    }

    const user_id = localStorage.getItem("user_id");
    // #region agent log
    fetch('http://127.0.0.1:7335/ingest/9d10bee9-2430-4471-b0be-893509ed00ae',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'1dca52'},body:JSON.stringify({sessionId:'1dca52',runId:'run-1',hypothesisId:'H5',location:'user/sos.html:191',message:'startSOS invoked',data:{hasUserId:!!user_id,selectedEmergencyLength:selectedEmergency.length},timestamp:Date.now()})}).catch(()=>{});
    // #endregion

    if(!user_id){
        alert("Login first");
        return;
    }

    document.getElementById(isSelf ? "selfOptions" : "thirdPartyForm").style.display = "none";

    status.innerHTML = "📡 Getting location...";

    // 🔥 GET LOCATION
    navigator.geolocation.getCurrentPosition(async (pos)=>{

        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        status.innerHTML = "🔍 Searching nearby hospitals...";

        try{

            const res = await medconnectFetch("/sos/",{
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({
                    user_id: user_id,
                    emergency_type: emergencyType,
                    latitude: lat,
                    longitude: lon,
                    is_for_self: isSelf,
                    third_party_name: tpName,
                    third_party_phone: tpPhone,
                    third_party_condition: tpCondition
                })
            });
            // #region agent log
            fetch('http://127.0.0.1:7335/ingest/9d10bee9-2430-4471-b0be-893509ed00ae',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'1dca52'},body:JSON.stringify({sessionId:'1dca52',runId:'run-1',hypothesisId:'H4',location:'user/sos.html:223',message:'sos request completed',data:{status:res.status,ok:res.ok},timestamp:Date.now()})}).catch(()=>{});
            // #endregion

            if(res.ok){
                startPolling(user_id);
            } else {
                alert("Error sending SOS");
                btn.disabled=false;
            }

        }catch(err){
            alert("Server error");
            btn.disabled=false;
        }

    },()=>{
        // #region agent log
        fetch('http://127.0.0.1:7335/ingest/9d10bee9-2430-4471-b0be-893509ed00ae',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'1dca52'},body:JSON.stringify({sessionId:'1dca52',runId:'run-1',hypothesisId:'H5',location:'user/sos.html:239',message:'geolocation denied',data:{hasUserId:!!user_id},timestamp:Date.now()})}).catch(()=>{});
        // #endregion
        alert("Location permission denied");
        btn.disabled=false;
    });
}

// 🔥 POLLING
function startPolling(user_id){

    const status = document.getElementById("statusText");

    if(polling){
        clearInterval(polling);
    }

    polling = setInterval(async ()=>{

        try{

            const res = await medconnectFetch(`/status/${user_id}/`);
            const data = await res.json();

            if(data.status === "ASSIGNED"){

                clearInterval(polling);

                const container = document.querySelector(".sos-container");
                container.innerHTML = `
                    <div class="success-screen" style="width:100%; text-align:center;">
                        <h1 style="color: #16a34a; font-size: 32px; margin-bottom: 5px;">🚑 Ambulance Dispatched!</h1>
                        <p style="font-size: 16px; color: #64748b; margin-top:0;">Hold tight, your driver is en route.</p>

                        <div style="background: #f8fafc; padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px solid #e2e8f0;">
                            <h2 style="font-size: 22px; color: #0f172a; margin: 0; font-weight: 800;">${data.hospital}</h2>
                            <p style="color:#ef4444; font-weight:700; margin:5px 0 0 0;">Distance: ${data.distance} km away</p>
                        </div>
                        
                        <!-- 🗺️ LIVE MAP CONTAINER -->
                        <div id="liveMap" style="height: 250px; width: 100%; border-radius: 16px; box-shadow:0 10px 20px rgba(0,0,0,0.1); margin-bottom:20px; border:2px solid white;"></div>

                        <button onclick="location.href='dashboard.html'" 
                            style="width: 100%; padding: 15px; border-radius: 12px; border: none; background: #0284c7; color: white; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s ease;">
                            Return to Dashboard
                        </button>
                    </div>
                `;

                // 🗺️ INITIALIZE LIVE TRACKING MAP
                setTimeout(() => {
                    navigator.geolocation.getCurrentPosition((pos) => {
                        const patLat = pos.coords.latitude;
                        const patLng = pos.coords.longitude;
                        
                        // Fake Hospital Origin (slightly offset based on distance)
                        const offset = (data.distance || 5) * 0.005;
                        const hospLat = patLat + offset;
                        const hospLng = patLng + offset;

                        const map = L.map('liveMap').setView([patLat, patLng], 13);
                        
                        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                            attribution: 'Map data &copy; <a href="https://www.openstreetmap.org/">OpenStreetMap</a>'
                        }).addTo(map);

                        // Patient Marker
                        L.marker([patLat, patLng]).addTo(map).bindPopup("<b>You are here</b>").openPopup();
                        
                        // Ambulance Marker (Fake tracking movement)
                        const ambIcon = L.icon({
                            iconUrl: 'https://cdn-icons-png.flaticon.com/512/814/814404.png',
                            iconSize: [40, 40],
                        });

                        const ambulanceMarker = L.marker([hospLat, hospLng], {icon: ambIcon}).addTo(map);
                        ambulanceMarker.bindPopup("<b>" + data.hospital + " Ambulance</b> <br> En Route!");

                        // Draw Route
                        const latlngs = [
                            [hospLat, hospLng],
                            [patLat, patLng]
                        ];
                        L.polyline(latlngs, {color: '#ef4444', weight: 4, dashArray: '5, 5'}).addTo(map);

                        map.fitBounds(latlngs, {padding: [30, 30]});

                    });
                }, 500);

            } else if(data.status === "SEARCHING"){

                status.innerHTML = "🔍 Expanding search radius...";

            }

        }catch(err){
            console.log(err);
        }

    },2000);
}

</script>

</body>
</html>
