<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emergency Contacts | MedConnect</title>

<link rel="stylesheet" href="../css/styles.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body {
margin: 0;
font-family: 'Inter', sans-serif;
background: #f8fafc;
color: #334155;
}

.container {
display: flex;
min-height: 100vh;
}

/* 🔥 CLINICAL SIDEBAR */
.sidebar {
width: 280px;
background: #ffffff;
border-right: 1px solid #e2e8f0;
padding: 40px 25px;
color: #334155;
display: flex;
flex-direction: column;
box-shadow: 2px 0 10px rgba(0,0,0,0.02);
z-index: 10;
}

.logo img {
width: 170px;
margin-bottom: 40px;
align-self: center;
}

.sidebar a {
color: #475569;
text-decoration: none;
padding: 14px 20px;
border-radius: 8px;
margin-bottom: 8px;
font-weight: 500;
font-size: 15px;
transition: all 0.2s;
}

.sidebar a:hover {
background: #f1f5f9;
color: #0284c7;
}

.sidebar a.active {
background: #e0f2fe;
color: #0284c7;
font-weight: 600;
}

.logout {
margin-top: auto;
background: #fee2e2 !important;
color: #dc2626 !important;
text-align: center;
font-weight: 700 !important;
}

.logout:hover {
background: #fecaca !important;
}

/* MAIN CONTENT */
.main {
flex: 1;
padding: 50px 60px;
max-width: 1000px;
}

.header {
background: #ffffff;
padding: 30px 40px;
border-radius: 12px;
box-shadow: 0 4px 6px rgba(0,0,0,0.02);
margin-bottom: 40px;
border: 1px solid #e2e8f0;
}

.header h1 {
margin: 0 0 10px 0;
font-weight: 800;
font-size: 32px;
}

.header p {
margin: 0;
color: #64748b;
font-size: 18px;
}

.contact-card, .form {
background: #ffffff;
padding: 35px;
border-radius: 12px;
box-shadow: 0 4px 6px rgba(0,0,0,0.02);
border: 1px solid #e2e8f0;
margin-bottom: 30px;
}

.contact {
display: flex;
justify-content: space-between;
align-items: center;
padding: 16px 0;
border-bottom: 1px solid #e2e8f0;
}

.contact:last-child {
border-bottom: none;
padding-bottom: 0;
}

.contact-name {
font-weight: 700;
font-size: 18px;
color: #0f172a;
}

.contact-phone {
color: #64748b;
font-size: 16px;
margin-top: 4px;
}

.form h3 {
margin: 0 0 20px 0;
font-size: 20px;
font-weight: 800;
}

.form input {
width: 100%;
padding: 14px 16px;
margin-bottom: 15px;
border-radius: 8px;
border: 1px solid #cbd5e1;
font-size: 16px;
font-family: 'Inter', sans-serif;
background: #f8fafc;
transition: all 0.2s;
box-sizing: border-box;
}

.form input:focus {
outline: none;
border-color: #0284c7;
background: white;
box-shadow: 0 0 0 4px rgba(2, 132, 199, 0.1);
}

.add-btn {
margin-top: 10px;
padding: 14px 30px;
background: #0284c7;
color: white;
border: none;
border-radius: 8px;
cursor: pointer;
font-weight: 700;
font-size: 16px;
font-family: 'Inter', sans-serif;
transition: all 0.2s;
width: 100%;
}

.add-btn:hover {
background: #0369a1;
transform: translateY(-2px);
box-shadow: 0 15px 30px rgba(2, 132, 199, 0.3);
}

.back {
display: inline-block;
margin-bottom: 25px;
text-decoration: none;
font-weight: 700;
color: #64748b;
padding: 12px 20px;
background: white;
border-radius: 12px;
box-shadow: 0 4px 10px rgba(0,0,0,0.03);
transition: all 0.2s;
}

.back:hover {
color: #0284c7;
box-shadow: 0 6px 15px rgba(0,0,0,0.06);
transform: translateY(-2px);
}

</style>
</head>
<body>

<div class="container">

<div class="sidebar">

<div class="logo">
<img src="../images/medconnect-logo.png">
</div>

<a href="dashboard.html">🏠 Dashboard</a>
<a href="sos.html">🚨 Emergency SOS</a>
<a href="alert-history.html">📋 Alert History</a>
<a href="profile.html">👤 Medical Profile</a>
<a href="contacts.html" class="active">📞 Emergency Contacts</a>
<a href="../hospitals.html">🏥 Nearby Hospitals</a>

<a href="../index.html" class="logout">Log Out</a>

</div>

<div class="main">

<a href="dashboard.html" class="back">
← Back to Dashboard
</a>

<div class="header">
<h1>Emergency Contacts</h1>
<p>These contacts will be notified automatically during SOS activation.</p>
</div>

<!-- 🔥 CONTACT LIST -->
<div class="contact-card" id="contactList">
</div>

<!-- 🔥 ADD CONTACT -->
<div class="form">

<h3>Add New Contact</h3>

<input type="text" id="name" placeholder="Contact Name">
<input type="text" id="phone" placeholder="Phone Number">

<button class="add-btn" onclick="addContact()">
Add Contact
</button>

</div>

</div>
</div>

<script src="../js/api-config.js"></script>
<script>

// 🔥 LOAD CONTACTS
async function loadContacts(){

    const user_id = localStorage.getItem("user_id");

    if(!user_id){
        alert("Please login first");
        return;
    }

    try {

        const res = await medconnectFetch(`/contacts/${user_id}/`);
        const data = await res.json();

        const container = document.getElementById("contactList");
        container.innerHTML = "";

        if(!data || data.length === 0){
            container.innerHTML = "<p>No contacts added</p>";
            return;
        }

        data.forEach(c => {

            container.innerHTML += `
                <div class="contact">
                    <div>
                        <div class="contact-name">${c.name}</div>
                        <div class="contact-phone">${c.phone}</div>
                    </div>
                </div>
            `;
        });

    } catch (error){
        console.log(error);
    }
}


// 🔥 ADD CONTACT
async function addContact(){

    const name = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const user_id = localStorage.getItem("user_id");

    if(!name || !phone){
        alert("Enter all fields");
        return;
    }

    try {

        const res = await medconnectFetch("/contacts/add/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                user_id: user_id,
                name: name,
                phone: phone
            })
        });

        const data = await res.json();

        if(res.ok){

            alert("Contact added successfully");

            document.getElementById("name").value = "";
            document.getElementById("phone").value = "";

            loadContacts();

        } else {
            alert(data.error || "Failed to add contact");
        }

    } catch (error){
        alert("Server error");
    }
}

loadContacts();

</script>

</body>
</html>
