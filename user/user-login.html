<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Login | MedConnect</title>

<link rel="stylesheet" href="../css/styles.css">

<style>

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f8fafc;
    display: flex;
    height: 100vh;
    overflow: hidden;
}

/* Split-Screen Container */
.login-container {
    display: flex;
    width: 100%;
}

/* Image Side */
.login-image {
    flex: 1.2;
    background-image: url('https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?w=1200&auto=format&fit=crop&q=80');
    background-position: center;
    background-size: cover;
    background-repeat: no-repeat;
    position: relative;
    background-color: #0f172a;
}

.login-image::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, rgba(15, 23, 42, 0.4), transparent);
}

.image-overlay-text {
    position: absolute;
    bottom: 60px;
    left: 60px;
    color: white;
    z-index: 10;
    max-width: 450px;
}

.image-overlay-text h1 {
    font-size: 38px;
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 15px;
}

.image-overlay-text p {
    font-size: 18px;
    opacity: 0.9;
}

/* Form Side */
.login-form-side {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px;
    background: white;
}

.login-card {
    width: 100%;
    max-width: 420px;
}

.logo-container {
    margin-bottom: 30px;
}

.logo-container img {
    height: 60px;
    width: auto;
}

h2 {
    font-size: 32px;
    font-weight: 800;
    color: #0f172a;
    margin-bottom: 10px;
}

.subtitle {
    font-size: 16px;
    color: #64748b;
    margin-bottom: 40px;
}

/* Inputs */
.input-group {
    margin-bottom: 20px;
}

.input-group label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: #334155;
    margin-bottom: 8px;
}

input {
    width: 100%;
    padding: 14px 18px;
    border-radius: 12px;
    border: 1px solid #e2e8f0;
    font-size: 16px;
    transition: all 0.2s;
    background: #f8fafc;
}

input:focus {
    outline: none;
    border-color: #0284c7;
    background: white;
    box-shadow: 0 0 0 4px rgba(2, 132, 199, 0.1);
}

/* Button */
.login-btn {
    width: 100%;
    padding: 18px; /* High-visibility click area */
    border: none;
    border-radius: 12px;
    background: #0284c7;
    color: white;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    margin-top: 15px;
    box-shadow: 0 4px 12px rgba(2, 132, 199, 0.2);
}

.login-btn:hover {
    background: #0369a1;
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(2, 132, 199, 0.3);
}

.register-text {
    margin-top: 30px;
    font-size: 15px;
    color: #64748b;
    text-align: center;
}

.register-text a {
    color: #0284c7;
    font-weight: 700;
    text-decoration: none;
}

.back-link {
    margin-top: 40px;
    display: block;
    text-align: center;
    color: #94a3b8;
    text-decoration: none;
    font-weight: 500;
    font-size: 14px;
    transition: color 0.2s;
}

.back-link:hover {
    color: #0f172a;
}

</style>

</head>

<body>

<div class="login-container">
    
    <!-- LEFT SIDE: IMAGE -->
    <div class="login-image">
        <div class="image-overlay-text">
            <h1>Expert Care,<br>Personalized for You</h1>
            <p>Access your medical history, manage emergency contacts, and stay connected with your healthcare providers.</p>
        </div>
    </div>

    <!-- RIGHT SIDE: FORM -->
    <div class="login-form-side">
        <div class="login-card">
            
            <div class="logo-container">
                <img src="../images/medconnect-logo.png" alt="MedConnect">
            </div>

            <h2>User Portal Access</h2>
            <p class="subtitle">Please enter your clinical credentials to continue.</p>

            <div class="input-group">
                <label>Institutional Email</label>
                <input type="email" id="email" placeholder="name@example.com">
            </div>

            <div class="input-group">
                <label>Secure Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <button class="login-btn" onclick="loginUser()">
                Secure Login
            </button>

            <div class="register-text">
                New to MedConnect? <a href="user-register.html">Create an Account</a>
            </div>

            <a href="../index.html" class="back-link">
                ← Back to Homepage
            </a>

        </div>
    </div>

</div>

<script src="../js/api-config.js"></script>
<script>

async function loginUser(){

    const data = {
        email: document.querySelector('input[type="email"]').value,
        password: document.querySelector('input[type="password"]').value
    };
    // #region agent log
    fetch('http://127.0.0.1:7335/ingest/9d10bee9-2430-4471-b0be-893509ed00ae',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'1dca52'},body:JSON.stringify({sessionId:'1dca52',runId:'run-1',hypothesisId:'H3',location:'user/user-login.html:204',message:'loginUser invoked',data:{emailProvided:!!data.email,passwordProvided:!!data.password},timestamp:Date.now()})}).catch(()=>{});
    // #endregion

    try {

        const response = await medconnectFetch("/user/login/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();
        // #region agent log
        fetch('http://127.0.0.1:7335/ingest/9d10bee9-2430-4471-b0be-893509ed00ae',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'1dca52'},body:JSON.stringify({sessionId:'1dca52',runId:'run-1',hypothesisId:'H2',location:'user/user-login.html:218',message:'login response parsed',data:{status:response.status,ok:response.ok,hasUserId:!!result.user_id,hasError:!!result.error},timestamp:Date.now()})}).catch(()=>{});
        // #endregion

        if (response.ok && result.user_id) {

            alert("✅ Login Successful!");

            // store user id (for future use like SOS)
            localStorage.setItem("user_id", result.user_id);

            window.location.href = "dashboard.html";

        } else {
            alert(`❌ ${result.error || "Invalid Email or Password"}`);
        }

    } catch (error) {
        // #region agent log
        fetch('http://127.0.0.1:7335/ingest/9d10bee9-2430-4471-b0be-893509ed00ae',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'1dca52'},body:JSON.stringify({sessionId:'1dca52',runId:'run-1',hypothesisId:'H1',location:'user/user-login.html:236',message:'login flow exception',data:{errorName:error?.name||'unknown'},timestamp:Date.now()})}).catch(()=>{});
        // #endregion
        console.error(error);
        alert("⚠️ Could not connect to backend. Start Django server on port 8001 or 8000.");
    }
}

</script>

</body>
</html>
