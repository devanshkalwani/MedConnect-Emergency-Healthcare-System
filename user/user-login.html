<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Login | MedConnect</title>

<link rel="stylesheet" href="../css/styles.css">

<style>

body{
    margin:0;
    font-family:"Segoe UI",sans-serif;
    background:linear-gradient(180deg,#eef4fa,#e6edf5);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Login Card */

.login-card{

    width:440px;
    background:white;

    padding:50px 45px;

    border-radius:20px;

    box-shadow:
    0 25px 50px rgba(0,0,0,0.15),
    0 5px 10px rgba(0,0,0,0.05);

    text-align:center;
}

/* Logo Container */

.logo-container{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:25px;
}

/* BIG LOGO */

.logo-container img{
    width:150px;
    height:auto;
}

/* Title */

.login-card h2{
    margin-bottom:28px;
    color:#0b2c48;
    font-size:28px;
    font-weight:600;
}

/* Inputs */

.login-card input{

    width:100%;
    padding:15px;

    margin-bottom:18px;

    border-radius:12px;
    border:1px solid #d0d7e2;

    font-size:16px;

    outline:none;

    transition:0.2s;
}

.login-card input:focus{

    border-color:#1d7db6;

    box-shadow:0 0 0 3px rgba(29,125,182,0.15);
}

/* Button */

.login-btn{

    width:100%;

    padding:15px;

    border:none;

    border-radius:12px;

    background:linear-gradient(135deg,#1d7db6,#0b5f94);

    color:white;

    font-size:17px;

    font-weight:600;

    cursor:pointer;

    transition:0.25s;
}

.login-btn:hover{

    transform:translateY(-2px);

    box-shadow:0 10px 25px rgba(29,125,182,0.3);
}

/* Register */

.register{

    margin-top:20px;
    font-size:15px;
    color:#555;
}

.register a{

    color:#1d7db6;
    font-weight:600;
    text-decoration:none;
}

/* Back Button */

.back-btn{

    display:inline-block;

    margin-top:22px;

    color:#0b2c48;

    text-decoration:none;

    font-weight:600;

    font-size:15px;
}

.back-btn:hover{

    text-decoration:underline;
}

</style>

</head>

<body>

<div class="login-card">

    <!-- BIG LOGO -->
    <div class="logo-container">
        <img src="../images/medconnect-logo.png" alt="MedConnect Logo">
    </div>

    <h2>User Portal Login</h2>

    <input type="email" id="email" placeholder="Enter Email">

    <input type="password" id="password" placeholder="Enter Password">

    <button class="login-btn" onclick="loginUser()">
        Login to Dashboard
    </button>

    <div class="register">
        New User? <a href="user-register.html">Register Here</a>
    </div>

    <a href="../index.html" class="back-btn">
        ← Back to Home
    </a>

</div>

<script src="../js/api-config.js"></script>
<script>

async function loginUser(){

    const data = {
        email: document.querySelector('input[type="email"]').value,
        password: document.querySelector('input[type="password"]').value
    };
    // #region agent log
    fetch('http://127.0.0.1:7335/ingest/9d10bee9-2430-4471-b0be-893509ed00ae',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'1dca52'},body:JSON.stringify({sessionId:'1dca52',runId:'run-1',hypothesisId:'H3',location:'user/user-login.html:204',message:'loginUser invoked',data:{emailProvided:!!data.email,passwordProvided:!!data.password},timestamp:Date.now()})}).catch(()=>{});
    // #endregion

    try {

        const response = await medconnectFetch("/user/login/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();
        // #region agent log
        fetch('http://127.0.0.1:7335/ingest/9d10bee9-2430-4471-b0be-893509ed00ae',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'1dca52'},body:JSON.stringify({sessionId:'1dca52',runId:'run-1',hypothesisId:'H2',location:'user/user-login.html:218',message:'login response parsed',data:{status:response.status,ok:response.ok,hasUserId:!!result.user_id,hasError:!!result.error},timestamp:Date.now()})}).catch(()=>{});
        // #endregion

        if (response.ok && result.user_id) {

            alert("✅ Login Successful!");

            // store user id (for future use like SOS)
            localStorage.setItem("user_id", result.user_id);

            window.location.href = "dashboard.html";

        } else {
            alert(`❌ ${result.error || "Invalid Email or Password"}`);
        }

    } catch (error) {
        // #region agent log
        fetch('http://127.0.0.1:7335/ingest/9d10bee9-2430-4471-b0be-893509ed00ae',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'1dca52'},body:JSON.stringify({sessionId:'1dca52',runId:'run-1',hypothesisId:'H1',location:'user/user-login.html:236',message:'login flow exception',data:{errorName:error?.name||'unknown'},timestamp:Date.now()})}).catch(()=>{});
        // #endregion
        console.error(error);
        alert("⚠️ Could not connect to backend. Start Django server on port 8001 or 8000.");
    }
}

</script>

</body>
</html>
