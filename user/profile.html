<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medical Profile | MedConnect</title>

<link rel="stylesheet" href="../css/styles.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body {
margin: 0;
font-family: 'Inter', sans-serif;
background: #f8fafc;
color: #334155;
}

.container {
display: flex;
min-height: 100vh;
}

/* 🔥 CLINICAL SIDEBAR */
.sidebar {
width: 280px;
background: #ffffff;
border-right: 1px solid #e2e8f0;
padding: 40px 25px;
color: #334155;
display: flex;
flex-direction: column;
box-shadow: 2px 0 10px rgba(0,0,0,0.02);
z-index: 10;
}

.logo img {
width: 170px;
margin-bottom: 40px;
align-self: center;
}

.sidebar a {
color: #475569;
text-decoration: none;
padding: 14px 20px;
border-radius: 8px;
margin-bottom: 8px;
font-weight: 500;
font-size: 15px;
transition: all 0.2s;
}

.sidebar a:hover {
background: #f1f5f9;
color: #0284c7;
}

.sidebar a.active {
background: #e0f2fe;
color: #0284c7;
font-weight: 600;
}

.logout {
margin-top: auto;
background: #fee2e2 !important;
color: #dc2626 !important;
text-align: center;
font-weight: 700 !important;
}

.logout:hover {
background: #fecaca !important;
}

/* MAIN CONTENT */
.main {
flex: 1;
padding: 50px 60px;
max-width: 1000px;
}

.header {
background: #ffffff;
padding: 30px 40px;
border-radius: 12px;
box-shadow: 0 4px 6px rgba(0,0,0,0.02);
margin-bottom: 40px;
border: 1px solid #e2e8f0;
}

.header h1 {
margin: 0 0 10px 0;
font-weight: 800;
font-size: 32px;
}

.header p {
margin: 0;
color: #64748b;
font-size: 18px;
}

.profile-card {
background: #ffffff;
padding: 40px;
border-radius: 12px;
box-shadow: 0 4px 6px rgba(0,0,0,0.02);
border: 1px solid #e2e8f0;
}

.form-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 25px;
}

.form-group {
display: flex;
flex-direction: column;
}

label {
font-weight: 700;
margin-bottom: 8px;
color: #475569;
font-size: 14px;
text-transform: uppercase;
letter-spacing: 0.5px;
}

input, select, textarea {
padding: 14px 16px;
border-radius: 8px;
border: 1px solid #cbd5e1;
font-size: 16px;
font-family: 'Inter', sans-serif;
background: #f8fafc;
transition: all 0.2s;
}

input:focus, select:focus, textarea:focus {
outline: none;
border-color: #0284c7;
background: white;
box-shadow: 0 0 0 4px rgba(2, 132, 199, 0.1);
}

.full {
grid-column: span 2;
}

.save-btn {
margin-top: 30px;
padding: 14px 28px;
background: #0284c7;
color: white;
border: none;
border-radius: 8px;
cursor: pointer;
font-weight: 700;
font-size: 16px;
font-family: 'Inter', sans-serif;
transition: all 0.2s;
}

.save-btn:hover {
background: #0369a1;
transform: translateY(-2px);
box-shadow: 0 15px 30px rgba(2, 132, 199, 0.3);
}

.back {
display: inline-block;
margin-bottom: 25px;
text-decoration: none;
font-weight: 700;
color: #64748b;
padding: 12px 20px;
background: white;
border-radius: 12px;
box-shadow: 0 4px 10px rgba(0,0,0,0.03);
transition: all 0.2s;
}

.back:hover {
color: #0284c7;
box-shadow: 0 6px 15px rgba(0,0,0,0.06);
transform: translateY(-2px);
}

</style>
</head>
<body>

<div class="container">

<div class="sidebar">

<div class="logo">
<img src="../images/medconnect-logo.png">
</div>

<a href="dashboard.html">🏠 Dashboard</a>
<a href="sos.html">🚨 Emergency SOS</a>
<a href="alert-history.html">📋 Alert History</a>
<a href="profile.html" class="active">👤 Medical Profile</a>
<a href="contacts.html">📞 Emergency Contacts</a>
<a href="../hospitals.html">🏥 Nearby Hospitals</a>

<a href="../index.html" class="logout">Log Out</a>

</div>

<div class="main">

<a href="dashboard.html" class="back">
← Back to Dashboard
</a>

<div class="header">
<h1>Medical Profile</h1>
<p>This data is shared with hospitals during SOS.</p>
</div>

<div class="profile-card">

<div class="form-grid">

<div class="form-group">
<label>Full Name</label>
<input type="text" id="name">
</div>

<div class="form-group">
<label>Age</label>
<input type="number" id="age">
</div>

<div class="form-group">
<label>Blood Group</label>
<select id="blood">
<option>O+</option>
<option>O-</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
</select>
</div>

<div class="form-group">
<label>Phone</label>
<input type="text" id="phone">
</div>

<div class="form-group full">
<label>Medical Conditions</label>
<textarea id="condition"></textarea>
</div>

<div class="form-group full">
<label>Allergies</label>
<textarea id="allergies"></textarea>
</div>

</div>

<button class="save-btn" onclick="saveProfile()">Save Profile</button>

</div>

</div>
</div>

<script src="../js/api-config.js"></script>
<script>

// 🔥 LOAD PROFILE
async function loadProfile(){

    const user_id = localStorage.getItem("user_id");

    if(!user_id){
        alert("Login first");
        return;
    }

    try{

        const res = await medconnectFetch(`/user/${user_id}/`);
        const data = await res.json();

        document.getElementById("name").value = data.first_name || "";
        document.getElementById("age").value = data.age || "";
        document.getElementById("blood").value = data.blood_group || "O+";
        document.getElementById("phone").value = data.phone || "";
        document.getElementById("condition").value = data.condition || "";
        document.getElementById("allergies").value = data.allergies || "";

    } catch(err){
        console.log(err);
    }
}


// 🔥 SAVE PROFILE
async function saveProfile(){

    const user_id = localStorage.getItem("user_id");

    const body = {
        user_id: user_id,
        name: document.getElementById("name").value,
        age: document.getElementById("age").value,
        blood_group: document.getElementById("blood").value,
        phone: document.getElementById("phone").value,
        condition: document.getElementById("condition").value,
        allergies: document.getElementById("allergies").value
    };

    try{

        const res = await medconnectFetch("/user/update/", {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify(body)
        });

        if(res.ok){
            alert("Profile saved successfully");
        } else {
            alert("Error saving profile");
        }

    } catch(err){
        alert("Server error");
    }
}

loadProfile();

</script>

</body>
</html>
