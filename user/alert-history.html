<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alert History | MedConnect</title>

<link rel="stylesheet" href="../css/styles.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body {
margin: 0;
font-family: 'Inter', sans-serif;
background: #f8fafc;
color: #334155;
}

.container {
display: flex;
min-height: 100vh;
}

/* 🔥 CLINICAL SIDEBAR */
.sidebar {
width: 280px;
background: #ffffff;
border-right: 1px solid #e2e8f0;
padding: 40px 25px;
color: #334155;
display: flex;
flex-direction: column;
box-shadow: 2px 0 10px rgba(0,0,0,0.02);
z-index: 10;
}

.logo img {
width: 170px;
margin-bottom: 40px;
align-self: center;
}

.sidebar a {
color: #475569;
text-decoration: none;
padding: 14px 20px;
border-radius: 8px;
margin-bottom: 8px;
font-weight: 500;
font-size: 15px;
transition: all 0.2s;
}

.sidebar a:hover {
background: #f1f5f9;
color: #0284c7;
}

.sidebar a.active {
background: #e0f2fe;
color: #0284c7;
font-weight: 600;
}

.logout {
margin-top: auto;
background: #fee2e2 !important;
color: #dc2626 !important;
text-align: center;
font-weight: 700 !important;
}

.logout:hover {
background: #fecaca !important;
}

/* MAIN CONTENT */
.main {
flex: 1;
padding: 50px 60px;
max-width: 1000px;
}

.header {
background: #ffffff;
padding: 30px 40px;
border-radius: 12px;
box-shadow: 0 4px 6px rgba(0,0,0,0.02);
margin-bottom: 40px;
border: 1px solid #e2e8f0;
}

.header h1 {
margin: 0 0 10px 0;
font-weight: 800;
font-size: 32px;
}

.header p {
margin: 0;
color: #64748b;
font-size: 18px;
}

/* 🔥 TIMELINE STYLES */
.timeline {
position: relative;
padding-left: 30px;
}

.timeline::before {
content: '';
position: absolute;
left: 0;
top: 10px;
bottom: 0;
width: 4px;
background: #e2e8f0;
border-radius: 4px;
}

.timeline-card {
position: relative;
background: white;
padding: 25px 30px;
border-radius: 20px;
box-shadow: 0 10px 30px rgba(0,0,0,0.03);
margin-bottom: 25px;
border: 1px solid #f1f5f9;
transition: transform 0.3s;
display: flex;
align-items: center;
justify-content: space-between;
}

.timeline-card:hover {
transform: translateY(-4px);
box-shadow: 0 15px 40px rgba(0,0,0,0.06);
}

.timeline-card::before {
content: '';
position: absolute;
left: -36px;
top: 35px;
width: 16px;
height: 16px;
border-radius: 50%;
background: #0ea5e9;
border: 4px solid #f1f5f9;
}

.time-stamp {
color: #94a3b8;
font-size: 14px;
font-weight: 600;
margin-bottom: 8px;
}

.em-type {
font-size: 20px;
font-weight: 800;
color: #0f172a;
margin-bottom: 5px;
}

.hosp-name {
color: #475569;
font-weight: 600;
font-size: 16px;
display: flex;
align-items: center;
gap: 8px;
}

.status-badge {
padding: 8px 16px;
border-radius: 20px;
font-weight: 700;
font-size: 14px;
text-transform: uppercase;
letter-spacing: 1px;
}

.badge-success {
background: #dcfce7;
color: #16a34a;
border: 1px solid #bbf7d0;
}

.badge-pending {
background: #ffedd5;
color: #ea580c;
border: 1px solid #fed7aa;
}

.back {
display: inline-block;
margin-bottom: 25px;
text-decoration: none;
font-weight: 700;
color: #64748b;
padding: 12px 20px;
background: white;
border-radius: 12px;
box-shadow: 0 4px 10px rgba(0,0,0,0.03);
transition: all 0.2s;
}

.back:hover {
color: #0284c7;
box-shadow: 0 6px 15px rgba(0,0,0,0.06);
transform: translateY(-2px);
}

</style>

</head>
<body>

<div class="container">

<div class="sidebar">

<div class="logo">
<img src="../images/medconnect-logo.png">
</div>

<a href="dashboard.html">🏠 Dashboard</a>
<a href="sos.html">🚨 Emergency SOS</a>
<a href="alert-history.html" class="active">📋 Alert History</a>
<a href="profile.html">👤 Medical Profile</a>
<a href="contacts.html">📞 Emergency Contacts</a>
<a href="../hospitals.html">🏥 Nearby Hospitals</a>

<a href="../index.html" class="logout">Log Out</a>

</div>

<div class="main">

<a href="dashboard.html" class="back">
← Back to Dashboard
</a>

<div class="header">
<h1>Emergency Alert History</h1>
<p>Track all past emergency beacons and dispatch logs in real-time.</p>
</div>

<!-- 🔥 DYNAMIC TIMELINE CONTAINER -->
<div class="timeline" id="historyTimeline">
    <div style="text-align:center; padding:20px; color:#64748b; font-weight:600;">
        ⏳ Connecting to server...
    </div>
</div>

</div>

</div>

<script src="../js/api-config.js"></script>
<script>

async function loadHistory(){

    const user_id = localStorage.getItem("user_id");

    if(!user_id){
        alert("Please login first");
        return;
    }

    try {

        const res = await medconnectFetch(`/history/${user_id}/`);
        const data = await res.json();

        const timeline = document.getElementById("historyTimeline");
        timeline.innerHTML = "";

        if(!data || data.length === 0){
            timeline.innerHTML = `
                <div style="background:white; padding:40px; border-radius:20px; text-align:center; color:#64748b; font-weight:600;">
                    No emergency history found.
                </div>
            `;
            return;
        }

        data.forEach(item => {

            let badgeClass = "badge-pending";
            let displayStatus = "Scanning";

            if(item.status === "ASSIGNED"){
                badgeClass = "badge-success";
                displayStatus = "Assigned";
            }

            // 🕰️ Formulate Timestamp properly
            let formattedDate = "Unknown Date";
            if (item.created_at) {
                const dateObj = new Date(item.created_at);
                formattedDate = dateObj.toLocaleString("en-US", {
                    month: "short", day: "numeric", year: "numeric",
                    hour: "numeric", minute: "2-digit", hour12: true
                });
            }

            const card = `
                <div class="timeline-card">
                    <div>
                        <div class="time-stamp">🕰️ ${formattedDate} &nbsp;|&nbsp; Reference ID: #${item.id}</div>
                        <div class="em-type">${item.emergency_type}</div>
                        <div class="hosp-name">
                            ${item.status === "ASSIGNED" ? `🚑 Dispatched: <b>${item.hospital}</b>` : `📡 Searching regional network...`}
                        </div>
                    </div>
                    <div>
                        <div class="status-badge ${badgeClass}">${displayStatus}</div>
                    </div>
                </div>
            `;

            timeline.innerHTML += card;
        });

    } catch (error){
        console.log("Timeline Error:", error);

        const timeline = document.getElementById("historyTimeline");
        timeline.innerHTML = `
            <div style="background:#fee2e2; padding:30px; border-radius:20px; text-align:center; color:#ef4444; font-weight:700;">
                ❌ Failed to sync timeline with server.
            </div>
        `;
    }
}

loadHistory();

</script>

</body>
</html>
