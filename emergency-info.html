<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Emergency Assistance — MedConnect</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:linear-gradient(180deg,#eef6fd,#d8e9f8);
}

/* ===== NAVBAR ===== */
.navbar{
height:70px;
display:flex;
align-items:center;
padding:0 40px;
background:white;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.back-btn{
text-decoration:none;
color:#0284c7;
font-weight:600;
}

/* ===== HERO ===== */
.hero{
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:38px;
margin-bottom:10px;
}

.hero p{
color:#475569;
margin-bottom:25px;
}

/* ===== BUTTON ===== */
.primary-btn{
background:#e63946;
color:white;
padding:16px 30px;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
}

.primary-btn:hover{
background:#d62828;
}

/* ===== ACTIONS ===== */
.quick-actions{
margin-top:20px;
}

.call-btn{
margin:6px;
padding:10px 20px;
background:#0284c7;
color:white;
border-radius:10px;
text-decoration:none;
}

/* ===== STATUS ===== */
.status{
margin-top:20px;
font-weight:600;
}

/* ===== MODAL ===== */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:30px;
border-radius:16px;
text-align:center;
}

.option-btn{
display:block;
margin:10px auto;
padding:12px 20px;
border:none;
border-radius:10px;
background:#0284c7;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="navbar">
<a href="index.html" class="back-btn">← Back</a>
</div>

<section class="hero">

<h1>Emergency Assistance Center</h1>
<p>Instantly alert hospitals and emergency services.</p>

<button class="primary-btn" onclick="openModal()">
🚨 Activate Emergency
</button>

<div class="quick-actions">
<a href="tel:108" class="call-btn">Ambulance</a>
<a href="tel:100" class="call-btn">Police</a>
<a href="tel:101" class="call-btn">Fire</a>
</div>

<div class="status" id="statusText">
System ready.
</div>

</section>

<!-- MODAL -->
<div class="modal" id="modal">

<div class="modal-content">

<h3>Select Emergency</h3>

<button class="option-btn" onclick="selectEmergency('Medical Emergency')">
Medical Emergency
</button>

<button class="option-btn" onclick="selectEmergency('Accident')">
Accident
</button>

<button class="option-btn" onclick="selectEmergency('Other')">
Other
</button>

<button class="option-btn" onclick="sendSOS()">
Send SOS
</button>

<button onclick="closeModal()">Cancel</button>

</div>

</div>

<script src="js/api-config.js"></script>
<script>

const BASE_URL = window.MEDCONNECT_API_BASE || "http://127.0.0.1:8001/api";

let selectedEmergency = "";

// OPEN MODAL
function openModal(){
document.getElementById("modal").style.display="flex";
}

// CLOSE
function closeModal(){
document.getElementById("modal").style.display="none";
}

// SELECT
function selectEmergency(type){
selectedEmergency = type;
}

// SEND SOS
async function sendSOS(){

const user_id = localStorage.getItem("user_id");

if(!user_id){
alert("Login first");
return;
}

if(!selectedEmergency){
alert("Select emergency type");
return;
}

document.getElementById("statusText").innerHTML = "📡 Getting location...";

navigator.geolocation.getCurrentPosition(async (pos)=>{

const lat = pos.coords.latitude;
const lon = pos.coords.longitude;

document.getElementById("statusText").innerHTML = "🔍 Searching hospitals...";

try{

const res = await medconnectFetch("/sos/",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
user_id:user_id,
latitude:lat,
longitude:lon,
emergency_type:selectedEmergency
})
});

if(res.ok){
closeModal();
checkStatus(user_id);
} else {
alert("Error sending SOS");
}

}catch(err){
alert("Server error");
}

},()=>{
alert("Location denied");
});

}


// CHECK STATUS
function checkStatus(user_id){

const interval = setInterval(async ()=>{

const res = await medconnectFetch(`/status/${user_id}/`);
const data = await res.json();

if(data.status === "ASSIGNED"){

clearInterval(interval);

document.getElementById("statusText").innerHTML =
"✅ " + data.hospital + " is responding!";

} else {
document.getElementById("statusText").innerHTML =
"🔍 Expanding search radius...";
}

},2000);

}

</script>

</body>
</html>
