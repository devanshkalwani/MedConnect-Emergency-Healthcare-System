<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hospital Login — MedConnect</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* BACKGROUND */

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;

background:linear-gradient(135deg,#e0f2fe,#f0f9ff);
}


/* LOGIN CARD */

.login-card{

width:420px;
background:white;
padding:50px;
border-radius:20px;

box-shadow:0 25px 60px rgba(2,6,23,.12);

text-align:center;
}


/* LOGO */

.login-card img{
height:55px;
margin-bottom:12px;
}

h2{
margin-bottom:25px;
color:#0f172a;
}


/* INPUTS */

input{

width:100%;
padding:14px;
margin-top:12px;

border-radius:10px;
border:1px solid #e2e8f0;

font-size:16px;
}

input:focus{
outline:none;
border-color:#0284c7;
}


/* BUTTON */

button{

margin-top:25px;
width:100%;
padding:14px;

border:none;
border-radius:12px;

background:#0284c7;
color:white;

font-size:17px;
font-weight:600;

cursor:pointer;
transition:.25s;
}

button:hover{
background:#0369a1;
}

</style>
</head>



<body>

<div class="login-card">

<img src="../images/medconnect-logo.png">

<h2>Hospital Control Login</h2>

<input type="text" placeholder="Hospital ID">
<input type="password" placeholder="Password">

<button onclick="location.href='dashboard.html'">
Login to Command Center
</button>

</div>

</body>
</html>
