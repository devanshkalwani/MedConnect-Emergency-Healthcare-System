<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hospital Login — MedConnect</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#eaf4fb,#f6fbff);
}

.card{
width:420px;
background:white;
padding:50px 40px;
border-radius:20px;
box-shadow:0 20px 50px rgba(2,6,23,.08);
text-align:center;
}

.logo{
height:65px;
margin-bottom:20px;
}

h2{
margin-bottom:25px;
font-size:24px;
color:#0f172a;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border-radius:12px;
border:1px solid #cbd5e1;
font-size:15px;
}

input:focus{
outline:none;
border-color:#0284c7;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:14px;
background:#0284c7;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#0369a1;
}

.link{
margin-top:18px;
font-size:14px;
}

.link a{
color:#0284c7;
text-decoration:none;
font-weight:600;
}

</style>
</head>

<body>

<div class="card">

<img src="../images/medconnect-logo.png" class="logo">

<h2>Hospital Command Center</h2>

<div id="errorMsg" style="display:none; color:#ef4444; background:#fee2e2; padding:12px; border-radius:10px; margin-bottom:15px; font-weight:600; font-size:14px;"></div>

<input type="email" id="email" placeholder="Hospital Email">
<input type="password" id="password" placeholder="Password">

<button onclick="loginHospital()" id="loginBtn">
Login to Command Center
</button>

<div class="link">
New Hospital? <a href="hospital-register.html">Register Here</a>
</div>

</div>

<script src="../js/api-config.js"></script>
<script>

async function loginHospital(){

    const btn = document.getElementById("loginBtn");
    const errorMsg = document.getElementById("errorMsg");

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    errorMsg.style.display = "none";

    if(!email || !password){
        errorMsg.innerText = "Please enter your email and password.";
        errorMsg.style.display = "block";
        return;
    }

    btn.disabled = true;
    btn.innerHTML = "⏳ Verifying...";
    btn.style.opacity = "0.8";

    try {

        const res = await medconnectFetch("/hospital/login/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: email,
                password: password
            })
        });

        const data = await res.json();

        if(res.ok){

            sessionStorage.setItem("hospital_id", data.hospital_id);
            sessionStorage.setItem("hospital_name", data.hospital_name);
            sessionStorage.setItem("total_beds", data.total_beds);
            sessionStorage.setItem("icu_beds", data.icu_beds);
            
            btn.innerHTML = "✅ Success";
            btn.style.background = "#16a34a";
            
            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 500);

        } else {
            errorMsg.innerText = data.error || "Invalid login credentials";
            errorMsg.style.display = "block";
            btn.disabled = false;
            btn.innerHTML = "Login to Command Center";
            btn.style.opacity = "1";
        }

    } catch (error){
        errorMsg.innerText = "Server error. Ensure backend is running.";
        errorMsg.style.display = "block";
        btn.disabled = false;
        btn.innerHTML = "Login to Command Center";
        btn.style.opacity = "1";
    }
}

</script>

</body>
</html>
