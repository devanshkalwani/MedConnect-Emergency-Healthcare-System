<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hospital Portal Dashboard | MedConnect</title>

<!-- GOOGLE FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- LEAFLET MAPS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#f8fafc;
color:#334155;
min-height: 100vh;
}

.nav {
    background: #ffffff;
    border-bottom: 1px solid #e2e8f0;
    color: #0f172a;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 1100;
}

.nav-brand-box {
    display: flex;
    align-items: center;
    gap: 15px;
}

.nav-brand-box img {
    height: 70px;
    width: auto;
}

.nav-title {
    font-size: 22px;
    font-weight: 800;
    color: #0f172a;
}

.dashboard-wrapper {
display: flex;
min-height: calc(100vh - 101px);
}

.sidebar {
width: 380px;
background: #ffffff;
border-right: 1px solid #e2e8f0;
padding: 30px 20px;
display: flex;
flex-direction: column;
}

.main-content {
flex: 1;
padding: 40px;
background: #f8fafc;
}

.radar-header {
    font-size: 18px;
    font-weight: 700;
    color: #0f172a;
    margin: 0 0 20px 0;
    padding-bottom: 15px;
    border-bottom: 2px solid #f1f5f9;
}

.sos-card{
background: #ffffff;
border: 1px solid #e2e8f0;
padding: 20px;
border-radius: 12px;
margin-bottom: 15px;
transition: all 0.2s;
}

.sos-card .label {
color: #64748b;
font-weight: 600;
font-size: 12px;
text-transform: uppercase;
margin-bottom: 4px;
}

.sos-card .value {
color: #0f172a;
font-size: 15px;
font-weight: 700;
margin-bottom: 10px;
}

.btn-accept {
width: 100%;
padding: 14px;
border:none;
background:#dc2626;
color:white;
border-radius:10px;
cursor:pointer;
font-weight: 700;
font-size: 15px;
transition: opacity 0.2s;
margin-top: 10px;
}

.btn-accept:hover {
background:#b91c1c;
}

/* Stats Overlay */
.stats-overlay {
position: absolute;
top: 20px;
right: 20px;
z-index: 1000;
display: flex;
gap: 15px;
}
.stat-box {
background: #ffffff;
border: 1px solid #e2e8f0;
box-shadow: 0 4px 10px rgba(0,0,0,0.05);
padding: 15px 20px;
border-radius: 12px;
min-width: 120px;
text-align: center;
}
/* Clinical Dashboard Panels */
.case-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 30px;
}

.clinical-panel {
    background: #ffffff;
    padding: 30px;
    border-radius: 16px;
    border: 1px solid #e2e8f0;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
}

.clinical-panel h2 {
    margin: 0 0 20px 0;
    font-size: 18px;
    color: #475569;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 2px solid #f8fafc;
    padding-bottom: 10px;
}

.clinical-row {
    display: flex;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid #f1f5f9;
}

.clinical-row:last-child {
    border-bottom: none;
}

.clinical-row span {
    color: #64748b;
    font-weight: 500;
}

.clinical-row strong {
    color: #0f172a;
}

#map-view {
    height: 350px;
    width: 100%;
    background: #f1f5f9;
    border-radius: 12px;
    margin-top: 20px;
}

</style>
</head>

<body>

<div class="nav">
    <div class="nav-brand-box">
        <img src="../images/medconnect-logo.png" alt="MedConnect">
        <div class="nav-title" id="hospitalNav">Hospital Command Center</div>
    </div>
    <div id="radarSync" style="font-size:12px; color:#16a34a; font-weight:800; display:flex; align-items:center; gap:8px;">
        <span style="width:8px; height:8px; background:#16a34a; border-radius:50%; display:inline-block;"></span>
        RADAR ONLINE
    </div>
</div>

<div class="dashboard-wrapper">
    
    <div class="sidebar">
        <h2 class="radar-header">Live Emergency Radar</h2>
        
        <div id="sosList"></div>

        <div class="dispatch-history">
            <h3 style="font-size:14px; color:#64748b; margin-bottom:15px;">Today's Dispatches</h3>
            <div id="historyList"></div>
        </div>
    </div>

    <div class="main-content">
        <!-- MODE 1: SCANNING (RADAR MAP) -->
        <div id="radarView" style="height: 100%;">
            <div id="dispatchMap" style="height: 100%; border-radius: 16px; border: 1px solid #e2e8f0;"></div>
        </div>

        <!-- MODE 2: DIAGNOSTIC (ACTIVE CASE) -->
        <div id="diagnosticView" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px;">
                <div>
                    <h1 id="activePatientName" style="margin:0; font-size:32px; font-weight:800; color:#0f172a;">-</h1>
                    <p style="margin:5px 0 0 0; color:#64748b; font-weight:600;">DISPATCH ACTIVE • AMBULANCE EN ROUTE</p>
                </div>
                <button onclick="resolveSOS()" style="padding:12px 24px; background:#16a34a; color:white; border:none; border-radius:8px; font-weight:700; cursor:pointer;">
                    RESOLVE EMERGENCY
                </button>
            </div>

            <div class="case-grid">
                <div class="clinical-panel">
                    <h2>Patient Clinical Profile</h2>
                    <div class="clinical-row"><span>Patient Age</span> <strong id="pAge">-</strong></div>
                    <div class="clinical-row"><span>Blood Group</span> <strong id="pBlood">-</strong></div>
                    <div class="clinical-row"><span>Institutional Contact</span> <strong id="pPhone">-</strong></div>
                    <div class="clinical-row"><span>Emergency Contact</span> <strong id="pEContact">-</strong></div>
                </div>

                <div class="clinical-panel">
                    <h2>EHR & Medical History</h2>
                    <div class="clinical-row"><span>Known Conditions</span> <strong id="pCondition">-</strong></div>
                    <div class="clinical-row"><span>Allergies</span> <strong id="pAllergies" style="color:#dc2626;">-</strong></div>
                    <div class="clinical-row"><span>Emergency Nature</span> <strong id="pEmergency" style="color:#ef4444;">-</strong></div>
                </div>
            </div>

            <div id="map-view"></div>
        </div>
    </div>

</div>

<script src="../js/api-config.js"></script>
<script>

let lastSOSDataStr = "";
let dispatchMap = null;
let markersLayer = null;

// 🔥 INIT LEAFLET MAP
function initMap() {
    dispatchMap = L.map('dispatchMap').setView([40.7128, -74.0060], 12);
    // Light Map Tile Layer
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: 'Map data &copy; OpenStreetMap'
    }).addTo(dispatchMap);
    
    markersLayer = L.layerGroup().addTo(dispatchMap);
}

// 🔥 LOAD SOS FROM BACKEND
async function loadSOS(){

    const hospital_id = sessionStorage.getItem("hospital_id");
    const hospital_name = sessionStorage.getItem("hospital_name");

    if(hospital_name) {
        document.getElementById("hospitalNav").innerText = hospital_name + " Dispatch Center";
    }

    const container = document.getElementById("sosList");

    if(!hospital_id){
        return;
    }

    try {

        const res = await medconnectFetch("/hospital/sos/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ hospital_id: hospital_id })
        });

        const data = await res.json();
        const dataStr = JSON.stringify(data);

        // 🚫 NO FLICKER: Skip DOM rebuild if data hasn't changed
        if(dataStr === lastSOSDataStr){
            return;
        }
        lastSOSDataStr = dataStr;

        // 🧹 CLEAR PREVIOUS STATE
        container.innerHTML = "";
        markersLayer.clearLayers();

        if(!data || data.length === 0){
            container.innerHTML = `
                <div style="padding:40px 20px; text-align:center; color:#64748b; font-weight:600;">
                    📡 Sector clear. <br>Scanning for SOS beacons...
                </div>
            `;
            return;
        }

        data.forEach(sos => {
            const card = document.createElement("div");
            card.className = "sos-card";

            card.innerHTML = `
                <div class="label">Patient Name</div>
                <div class="value">${sos.patient_name}</div>
                
                <div class="label">Primary Contact</div>
                <div class="value">${sos.patient_phone}</div>

                <div class="label">Emergency Details</div>
                <div class="value" style="color:#dc2626;">${sos.emergency}</div>

                <div style="display:flex; justify-content:space-between; margin-top:15px;">
                    <span style="font-size:12px; font-weight:600; color:#64748b;">📍 ${sos.distance} KM</span>
                    <span style="font-size:12px; font-weight:600; color:#64748b;">⏳ ${sos.time}s AGO</span>
                </div>

                <button class="btn-accept" onclick="acceptSOS(${sos.id}, ${sos.lat}, ${sos.lng})">
                    DISPATCH AMBULANCE
                </button>
            `;

            container.appendChild(card);

            // 🗺️ PLOT ON LEAFLET MAP
            const marker = L.circleMarker([sos.lat, sos.lng], {
                radius: 10,
                fillColor: "#ef4444",
                color: "#fca5a5",
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(markersLayer);
            
            marker.bindPopup(`<b style="color:black;">${sos.patient_name}</b><br>${sos.emergency}`);
        });
        
        // Auto-center on nearest SOS
        if(data.length > 0) {
            dispatchMap.setView([data[0].lat, data[0].lng], 13);
        }

    } catch (error) {
        console.error("Error loading SOS:", error);
        container.innerHTML = `<div style="color:#ef4444;">Server error locking radar.</div>`;
    }
}


// 🔥 OVERHAULED ACCEPT SOS
async function acceptSOS(request_id, lat, lng){

    const hospital_id = sessionStorage.getItem("hospital_id");

    try {
        const res = await medconnectFetch(`/hospital/accept/${request_id}/`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ hospital_id: hospital_id })
        });

        const data = await res.json();

        if(res.ok){
            if(window.sosInterval) clearInterval(window.sosInterval);

            // 1. SWITCH UI MODE
            document.getElementById("radarView").style.display = "none";
            document.getElementById("diagnosticView").style.display = "block";
            document.getElementById("sosList").innerHTML = `
                <div style="background:#f0fdf4; color:#16a34a; padding:15px; border-radius:10px; font-weight:700; text-align:center;">
                    🚑 AMBULANCE EN ROUTE
                </div>
            `;

            // 2. HYDRATE CLINICAL DATA (REAL-TIME TRANSFER)
            const clinicalRes = await medconnectFetch(`/sos/details/${request_id}/`);
            const clinical = await clinicalRes.json();

            document.getElementById("activePatientName").innerText = clinical.name;
            document.getElementById("pAge").innerText = clinical.age || "N/A";
            document.getElementById("pBlood").innerText = clinical.blood_group || "N/A";
            document.getElementById("pPhone").innerText = clinical.phone || "N/A";
            document.getElementById("pEContact").innerText = clinical.emergency_contact || "N/A";
            document.getElementById("pCondition").innerText = clinical.medical_condition || "None Reported";
            document.getElementById("pAllergies").innerText = clinical.allergies || "None";
            document.getElementById("pEmergency").innerText = clinical.emergency_type;

            // 3. MAP TRACING
            const diagMap = L.map('map-view').setView([lat, lng], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(diagMap);
            L.marker([lat, lng]).addTo(diagMap).bindPopup("<b>Victim Real-Time Location</b>").openPopup();

            // Store ID for resolve
            window.activeCaseId = request_id;

        } else {
            alert(data.error);
        }
    } catch (error){
        console.error(error);
    }
}

async function resolveSOS(){
    if(!window.activeCaseId) return;
    try {
        await medconnectFetch(`/sos/resolve/${window.activeCaseId}/`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ user_id: localStorage.getItem("user_id") || 1 }) // Dummy user id just to fulfill API requirement
        });
        location.reload();
    } catch(e){ alert("Resolve failed"); }
}

// Boot Sequence
initMap();
loadSOS();

// 🔥 SILENT RADIUS POLLING (No flicker)
window.sosInterval = setInterval(loadSOS, 5000);

// 🚀 REAL-TIME WEBSOCKETS (Zero-latency Sync)
const wsProtocol = window.location.protocol === "https:" ? "wss" : "ws";
const wsUrl = `${wsProtocol}://127.0.0.1:8001/ws/emergency/`;
const emergencySocket = new WebSocket(wsUrl);

emergencySocket.onmessage = function(e) {
    const payload = JSON.parse(e.data);
    if(payload.action === "NEW_SOS"){
        // 🎙️ HTML5 Voice Announcer
        if ('speechSynthesis' in window) {
            const msg = new SpeechSynthesisUtterance("Flash Override: New emergency detected in sector.");
            msg.rate = 1.1; msg.pitch = 0.9;
            window.speechSynthesis.speak(msg);
        }
    }
    
    if(payload.action === "NEW_SOS" || payload.action === "SOS_ASSIGNED"){
        setTimeout(() => {
            loadSOS();
        }, 300);
    }
};

emergencySocket.onopen = function(e) {
    console.log("🟢 WebSockets Connected - Real-Time Sync Active");
};

emergencySocket.onclose = function(e) {
    console.error("🔴 WebSockets Disconnected");
};

</script>

</body>
</html>
