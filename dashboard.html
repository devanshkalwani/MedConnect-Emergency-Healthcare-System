<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>User Dashboard — MedConnect</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#f1f7fc;
}

/* NAV */

.nav{
background:#0284c7;
color:white;
padding:20px 8%;
font-size:22px;
font-weight:700;
}

/* DASHBOARD */

.container{
padding:60px 8%;
text-align:center;
}

h1{
font-size:34px;
margin-bottom:40px;
}

/* SOS */

.sos{
margin:40px auto;
width:320px;
padding:26px;
background:#dc2626;
color:white;
border-radius:100px;
font-size:24px;
font-weight:700;
cursor:pointer;
box-shadow:0 20px 40px rgba(220,38,38,.3);
}

/* CARDS */

.grid{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
margin-top:50px;
}

.card{
width:260px;
background:white;
padding:35px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,.06);
cursor:pointer;
font-size:20px;
font-weight:600;
}

.card:hover{
transform:translateY(-6px);
}

</style>
</head>

<body>

<div class="nav">
MedConnect User Portal
</div>

<div class="container">

<h1>Welcome Back</h1>

<div class="sos"
onclick="location.href='emergency.html'">
🚨 ACTIVATE SOS
</div>

<div class="grid">

<div class="card"
onclick="location.href='medical-profile.html'">
Medical Profile
</div>

<div class="card">
Emergency Contacts
</div>

<div class="card">
Alert History
</div>

</div>

</div>

</body>
</html>
