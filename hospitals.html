<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MedConnect Partner Hospitals</title>

<style>

body{
margin:0;
font-family:"Segoe UI",sans-serif;
background:linear-gradient(180deg,#f4f9fd,#e6f1f8);
}

.navbar{
height:70px;
display:flex;
align-items:center;
padding:0 40px;
background:white;
box-shadow:0 2px 12px rgba(0,0,0,0.05);
}

.back{
color:#0369a1;
text-decoration:none;
font-weight:600;
margin-right:20px;
}

.header{
text-align:center;
padding:50px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:25px;
padding:40px;
}

.card{
background:white;
padding:20px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.status{
font-size:12px;
padding:5px 10px;
border-radius:20px;
display:inline-block;
margin-bottom:10px;
}

.ready{ background:#dcfce7; color:#15803d; }
.moderate{ background:#fff7ed; color:#c2410c; }

.btn{
display:inline-block;
margin-top:10px;
padding:8px 14px;
border-radius:8px;
text-decoration:none;
color:white;
font-size:13px;
}

.call{ background:#dc2626; }
.map{ background:#15803d; }

</style>

</head>

<body>

<div class="navbar">
<a href="index.html" class="back">← Back</a>
<strong>MedConnect Hospital Network</strong>
</div>

<div class="header">
<h1>Nearby Hospitals</h1>
<p>Real-time emergency hospital network</p>
</div>

<div class="grid" id="hospitalList">
</div>

<script src="js/api-config.js"></script>
<script>

// 🔥 LOAD HOSPITALS
async function loadHospitals(){

    try{

        const res = await medconnectFetch("/hospitals/");
        const data = await res.json();

        const container = document.getElementById("hospitalList");
        container.innerHTML = "";

        if(!data || data.length === 0){
            container.innerHTML = "<p>No hospitals available</p>";
            return;
        }

        data.forEach(h => {

            const statusClass = h.icu_beds > 5 ? "ready" : "moderate";

            const card = `
            <div class="card">

                <div class="status ${statusClass}">
                    ${h.icu_beds > 5 ? "Emergency Ready" : "Moderate Load"}
                </div>

                <h2>${h.name}</h2>

                <p>
                Total Beds: ${h.total_beds}<br>
                ICU Beds: ${h.icu_beds}<br>
                City: ${h.city}
                </p>

                <a href="tel:${h.phone || ''}" class="btn call">Call</a>

            </div>
            `;

            container.innerHTML += card;
        });

    }catch(err){
        console.log(err);
    }
}

loadHospitals();

</script>

</body>
</html>
